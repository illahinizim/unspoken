<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf Enes Uyar | By dxles</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #000;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: 'Quicksand', sans-serif;
            color: #f5f0e8;
        }

        #entry {
            position: fixed; inset: 0; z-index: 200;
            background: #000;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 1s ease;
        }
        #entry.gone { opacity: 0; visibility: hidden; pointer-events: none; }

        .entry-line { width: 80px; height: 1px; background: #e8d5b0; margin-bottom: 20px; }
        .entry-sub { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5em; color: rgba(245,240,232,0.55); }

        .center-text {
            font-size: 1.1rem;
            line-height: 1.8;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            z-index: 10;
            text-align: center;
            display: none;
            max-width: 85%;
            word-wrap: break-word;
        }

        .center-text a {
            color: #e8d5b0;
            text-decoration: underline;
            display: block;
            margin-top: 15px;
        }

        .emoji {
            position: fixed; top: -60px;
            font-size: 2rem; user-select: none; pointer-events: none;
            animation: fall linear forwards; z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        #bgVideo { position: fixed; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="entry" onclick="startPage()">
        <div class="entry-line"></div>
        <span class="entry-sub">click to enter</span>
    </div>

    <div class="center-text" id="mainText">
        TC: 13759520170 <br>
        | YUSUF ENES UYAR (7.2.2011) | <br>
        Yuzevler Mah. Gocur Pehlivan Sk 7. <br>
        Nur Apt No 5. Kat 5 Daire 7 <br>
        Vergi Numarası: 8981212757 <br>
        AMASYA / MERKEZ <br>
        <a href="https://shortlink.uk/1tGNm" target="_blank" rel="noopener">EV KOORDİNATLARI</a>
    </div>

    <video id="bgVideo" playsinline loop></video>

    <script>
        const video = document.getElementById('bgVideo');
        const entry = document.getElementById('entry');
        const mainText = document.getElementById('mainText');
        
        const VIDEOS = ['mufasa.mp4''];

        function startPage() {
            entry.classList.add('gone');
            mainText.style.display = 'block';

            const randomVid = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];
            video.src = randomVid;
            video.volume = 0.7;
            
            video.play().catch(err => {
                console.log("Video oynatılamadı, yolların doğru olduğundan emin ol:", err);
            });

            setInterval(createEmoji, 120);
        }

        function createEmoji() {
            const emojis = ['😂'];
            const e = document.createElement('div');
            e.classList.add('emoji');
            e.innerText = emojis[0];
            e.style.left = Math.random() * 100 + "vw";
            e.style.animationDuration = (Math.random() * 2 + 2) + "s";
            e.style.opacity = Math.random();
            e.style.fontSize = (Math.random() * 25 + 15) + "px";
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 4000);
        }
    </script>
</body>
</html>
