<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>m.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e8d5b0;
      --text: #f5f0e8;
      --sub: rgba(245,240,232,0.55);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── ENTRY GÜNCELLEME ── */
    #entry {
      position: fixed; inset: 0; z-index: 200;
      background: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1.3s ease, visibility 1.3s ease;
    }
    #entry.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    .entry-content {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      text-align: center; color: var(--text);
    }

    .entry-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem; font-weight: 300;
      letter-spacing: 0.3em;
      opacity: 0; transform: translateY(15px);
      animation: entryFade 1.6s ease forwards;
    }

    .entry-line {
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #entry:hover .entry-line { width: 80px; }

    .entry-sub {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.5em; color: var(--sub);
      opacity: 0;
      animation: entryFade 1.6s ease 0.6s forwards;
    }

    @keyframes entryFade {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── VIDEO ── */
    #vid {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #vid.on { opacity: 1; }

    #veil {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.4) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.62) 100%);
      pointer-events: none;
    }

    /* ── VOL ── */
    #volbtn {
      position: fixed; top: 1.4rem; right: 1.4rem; z-index: 50;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.7s, background 0.3s;
    }
    #volbtn.on { opacity: 1; }
    #volbtn:hover { background: rgba(255,255,255,0.12); }
    #volbtn svg { width: 15px; height: 15px; stroke: var(--text); fill: none; stroke-width: 1.6; }

    /* ── SOCIALS ── */
    #socials {
      position: fixed;
      bottom: 2.2rem; left: 0; right: 0;
      z-index: 40;
      display: flex; justify-content: center; align-items: center;
      gap: 0.7rem;
      opacity: 0; transition: opacity 1.3s ease 0.7s;
    }
    #socials.on { opacity: 1; }

    .s-btn {
      display: flex; align-items: center; gap: 0.42rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--sub);
      padding: 0.56rem 1.3rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(16px);
      cursor: pointer;
      text-decoration: none;
      border-radius: 1px;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      white-space: nowrap;
    }
    .s-btn svg { width: 13px; height: 13px; flex-shrink: 0; transition: transform 0.3s; }
    .s-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.26); background: rgba(0,0,0,0.48); }
    .s-btn:hover svg { transform: scale(1.18); }

    .sep { width: 1px; height: 11px; background: rgba(255,255,255,0.13); }

    /* ── TELEGRAM DROPDOWN ── */
    .tg-wrap { position: relative; }

    .tg-menu {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 230px;
      background: rgba(6,6,6,0.88);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s;
      overflow: hidden;
    }
    .tg-wrap.open .tg-menu {
      opacity: 1; visibility: visible; pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .tg-menu::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 8px; height: 8px;
      background: rgba(6,6,6,0.88);
      border-right: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* scrollable list area */
    .tg-scroll {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .tg-scroll::-webkit-scrollbar { width: 3px; }
    .tg-scroll::-webkit-scrollbar-track { background: transparent; }
    .tg-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .tg-section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.46rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      padding: 0.55rem 1.1rem 0.2rem;
    }
    .tg-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.25rem 0; }

    .tg-item {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.52rem 1.1rem;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sub);
      white-space: nowrap;
      transition: color 0.22s, background 0.22s;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tg-item:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .tg-item svg { width: 11px; height: 11px; flex-shrink: 0; opacity: 0.6; }
    .tg-item.account { color: rgba(232,213,176,0.7); }
    .tg-item.account:hover { color: var(--accent); }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      #socials { bottom: 1.3rem; gap: 0.45rem; }
      .s-btn { padding: 0.5rem 0.9rem; font-size: 0.54rem; letter-spacing: 0.28em; }
      .tg-menu { width: 210px; }
    }
  </style>
</head>

<script>
  const VIDEOS = ['Aslarr.webm', 'Yinyang.webm'];
  const vid     = document.getElementById('vid');
  const volBtn  = document.getElementById('volbtn');
  const socials = document.getElementById('socials');
  const icoOn   = document.getElementById('ico-on');
  const icoOff  = document.getElementById('ico-off');
  const tgWrap  = document.getElementById('tgWrap');

  vid.src = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];

  function go() {
    document.getElementById('entry').classList.add('gone');
    vid.muted = false;
    vid.volume = 0.7;
    vid.play().catch(() => { vid.muted = true; vid.play(); });
    vid.classList.add('on');
    socials.classList.add('on');
    volBtn.classList.add('on');
  }

  function toggleMute() {
    vid.muted = !vid.muted;
    icoOn.style.display  = vid.muted ? 'none' : '';
    icoOff.style.display = vid.muted ? '' : 'none';
  }

  function toggleTg(e) {
    e.stopPropagation();
    tgWrap.classList.toggle('open');
  }

  document.addEventListener('click', () => tgWrap.classList.remove('open'));
  document.getElementById('tgMenu').addEventListener('click', e => e.stopPropagation());
</script>
